name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 💡 新增權限設定：GitHub Pages 部署需要寫入儲存庫內容的權限
permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: 複製 GitHub 儲存庫的程式碼到虛擬機中
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: 設定 Java 17 環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # 快取 Maven 依賴，加速後續的 CI 執行

    # Step 3: 使用 Maven 進行編譯、跑測試，並觸發 TeaVM 生成靜態網頁檔案
    # 這裡使用 mvn clean package，Maven 會自動把編譯好的 JS 網頁放到 target 資料夾
    - name: Build and Run Tests with Maven
      run: mvn clean package

    # Step 4: 執行 Codecov 上傳覆蓋率報告
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: ${{ github.repository }}